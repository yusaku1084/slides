name: Deploy Slides

on:
  push:
    branches:
      - main
    paths:
      - 'talks/**/slides.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build slides
        run: |
          mkdir -p _site
          for dir in talks/*/; do
            if [ -f "$dir/slides.md" ]; then
              talk_name=$(basename "$dir")
              mkdir -p "_site/$talk_name"
              
              # HTML生成
              marp "$dir/slides.md" \
                --html \
                --output "_site/$talk_name/index.html"
              
              # PDF生成
              marp "$dir/slides.md" \
                --pdf \
                --output "_site/$talk_name/slides.pdf"
              
              echo "Built: $talk_name"
            fi
          done

      - name: Generate index page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Slides</title>
            <style>
              body {
                font-family: 'Helvetica Neue', Arial, sans-serif;
                max-width: 800px;
                margin: 0 auto;
                padding: 2em;
                background: #f8f9fa;
                color: #1a1a2e;
              }
              h1 {
                color: #667eea;
                border-bottom: 3px solid #667eea;
                padding-bottom: 0.3em;
              }
              .talks {
                display: grid;
                gap: 1em;
                margin-top: 2em;
              }
              .talk {
                background: white;
                border-radius: 12px;
                padding: 1.5em;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                border-left: 4px solid #667eea;
              }
              .talk h2 {
                margin: 0 0 0.5em;
                color: #1a1a2e;
                font-size: 1.1em;
              }
              .links {
                display: flex;
                gap: 1em;
                margin-top: 0.8em;
              }
              .links a {
                color: #667eea;
                text-decoration: none;
                font-size: 0.9em;
                padding: 0.3em 0.8em;
                border: 1px solid #667eea;
                border-radius: 6px;
              }
              .links a:hover {
                background: #667eea;
                color: white;
              }
            </style>
          </head>
          <body>
            <h1>📊 Slides</h1>
            <div class="talks">
          EOF

          for dir in talks/*/; do
            if [ -f "$dir/slides.md" ]; then
              talk_name=$(basename "$dir")
              cat >> _site/index.html << EOF
              <div class="talk">
                <h2>$talk_name</h2>
                <div class="links">
                  <a href="$talk_name/index.html">スライドを見る</a>
                  <a href="$talk_name/slides.pdf">PDFダウンロード</a>
                </div>
              </div>
          EOF
            fi
          done

          cat >> _site/index.html << 'EOF'
            </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
